<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>편식개선키트 원가율표 V2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:24px;padding:48px 40px;max-width:500px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.08);}
.icon{font-size:48px;margin-bottom:16px;}
h1{font-size:22px;color:#1a5c32;margin-bottom:8px;}
.sub{font-size:14px;color:#666;margin-bottom:32px;line-height:1.6;}
.btn{display:inline-flex;align-items:center;gap:10px;padding:16px 32px;border-radius:14px;font-size:16px;font-weight:700;text-decoration:none;transition:all 0.2s;border:none;cursor:pointer;font-family:inherit;width:100%;justify-content:center;margin-bottom:12px;}
.btn-google{background:#1a73e8;color:#fff;}
.btn-google:hover{background:#1557b0;}
.btn-download{background:#f5f5f5;color:#333;}
.btn-download:hover{background:#e8e8e8;}
.btn img{width:20px;height:20px;}
.info{margin-top:24px;padding:16px;background:#f8faf8;border-radius:12px;text-align:left;}
.info p{font-size:12px;color:#888;line-height:1.7;}
.info strong{color:#555;}
.sheets{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px;justify-content:center;}
.sheet-tag{font-size:11px;background:#e8f5ec;color:#2D8B4E;padding:4px 10px;border-radius:8px;font-weight:600;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📊</div>
  <h1>편식개선키트 원가율표 V2</h1>
  <p class="sub">최신 커리큘럼 기반 · 도매가 기준 · 주차별 원가 계산<br>9코스 × 5주차 = 471개 수식 자동 계산</p>

  <a class="btn btn-google" href="https://docs.google.com/spreadsheets/d/create" onclick="alert('1. 구글 시트가 열리면 [파일] → [가져오기] 클릭\n2. [업로드] 탭 선택\n3. 다운로드된 xlsx 파일을 드래그\n4. 완료!'); return true;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
    구글 시트로 열기
  </a>

  <a class="btn btn-download" href="편식개선키트-원가율표-v2.xlsx" download>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="#333"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    xlsx 다운로드
  </a>

  <div class="info">
    <p><strong>포함 시트:</strong></p>
    <div class="sheets">
      <span class="sheet-tag">전체요약</span>
      <span class="sheet-tag">🥕 당근</span>
      <span class="sheet-tag">🍅 토마토</span>
      <span class="sheet-tag">🥦 브로콜리</span>
      <span class="sheet-tag">🍆 가지</span>
      <span class="sheet-tag">🍄 버섯</span>
      <span class="sheet-tag">🧅 양파</span>
      <span class="sheet-tag">🫑 파프리카</span>
      <span class="sheet-tag">🥬 시금치</span>
      <span class="sheet-tag">🧊 두부</span>
    </div>
    <p style="margin-top:12px;">
      <strong>구조:</strong> 공통교구 + 주차별(1~5주) 재료 원가 → 총원가 → 마진/원가율 자동계산<br>
      <strong>단가:</strong> 도매가 기준 (쿠팡/네이버 도매몰 참고)<br>
      <strong>수식:</strong> 471개 · 에러 0건
    </p>
  </div>
</div>
</body>
</html>
