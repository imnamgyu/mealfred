<script>
const QUIZ=[
 {q:"새로운 음식, 아이가 받아들이기까지 평균 몇 번을 권해야 할까요?",
  o:["1~2번","3~5번","8~15번 이상","거의 안 변해요"],a:2,
  ex:"거부는 정상이에요. 많게는 15번 이상 반복 노출해야 받아들이는 경우가 많은데, 대부분의 부모는 서너 번 거부하면 '얘는 안 먹는 애'로 결론 내려요. 포기가 제일 아까운 지점이에요."},
 {q:"\"한 입만 먹어봐\" 하고 계속 권하면?",
  o:["결국 먹게 되고 양도 늘어요","그 음식이 더 싫어질 수 있어요"],a:1,
  ex:"압박은 그 음식에 대한 거부를 오히려 강화해요(Galloway 2006). '먹이려는 노력'이 셀수록 식탁이 전쟁이 되는 이유예요. 정석은 강요 없는 반복 노출이에요."},
 {q:"싫어하는 채소, 잘게 갈아 몰래 넣어 먹이면 편식이 고쳐진다?",
  o:["O — 계속 먹다 보면 익숙해진다","X — 그날 영양만 채워질 뿐"],a:1,
  ex:"아이는 자기가 채소를 먹었는지 몰라요. 그래서 '보이는 채소'는 여전히 거부해요. 숨기기는 영양 보조 수단일 뿐 — 보고·만지고·친해지는 노출 없이는 편식 자체가 안 바뀌어요."},
 {q:"\"이거 다 먹으면 아이스크림 줄게\" — 이 거래의 효과는?",
  o:["채소랑 친해지는 좋은 동기부여","그 순간뿐, 채소는 오히려 더 싫어질 수 있어요"],a:1,
  ex:"보상 거래는 아이 머릿속에 '채소=참아야 하는 벌, 디저트=진짜 좋은 것'을 각인해요. 연구에서도 보상을 걸고 먹인 음식은 나중에 선호가 오히려 떨어졌어요."},
 {q:"\"남기지 말고 그릇 싹 비워야지\" 그릇 비우기 교육은?",
  o:["바른 식습관의 기초","배부름 신호를 무시하는 습관이 될 수 있어요"],a:1,
  ex:"먹는 양의 기준은 '그릇'이 아니라 '아이 배'여야 해요. 그릇 기준으로 먹이면 포만 신호를 무시하는 습관이 들고, 식사가 숙제가 되면서 거부만 커져요."},
 {q:"\"편식은 크면 다 나아져\" — 이 말은?",
  o:["맞아요, 기다리면 돼요","절반만 맞아요 — 저절로 안 나아지는 경우도 많아요"],a:1,
  ex:"가벼운 편식은 크면서 대개 나아져요. 하지만 추적 연구에서는 편식이 학령기까지 수년씩 이어지는 아이들도 상당수였어요. 정도가 심하다면 '기다리기'보다 부드러운 개입이 빨라요."},
 {q:"저녁을 잘 안 먹는 아이, 가장 먼저 확인할 것은?",
  o:["반찬 메뉴가 마음에 안 드는지","식사 1~2시간 전 간식·우유"],a:1,
  ex:"밥 전에 간식 한 줌, 우유 한 컵이면 아이 위는 이미 차요. '안 먹는 아이'가 아니라 '배고플 틈이 없던 아이'인 경우가 정말 많아요. 코칭에서 제일 먼저 확인하는 신호 중 하나예요."},
 {q:"아이가 새 음식을 먹게 만드는 데 더 힘이 센 것은?",
  o:["\"몸에 좋아, 먹어봐\" 하는 설명","부모가 옆에서 같은 걸 맛있게 먹는 모습"],a:1,
  ex:"아이는 말보다 눈으로 배워요. 부모가 같은 음식을 맛있게 먹는 모습이 백 마디 설명보다 강해요. '먹이는 사람'이 아니라 '같이 먹는 사람'이 되는 게 핵심이에요."},
 {q:"식사에서 역할 분담, 가장 건강한 방식은?",
  o:["부모가 무엇·얼마나 다 정한다","아이가 무엇·얼마나 다 정한다","부모=무엇·언제, 아이=먹을지·얼마나"],a:2,
  ex:"사터의 책임 분담(DOR): 부모는 '무엇을·언제·어디서', 아이는 '먹을지·얼마나'를 정해요. '얼마나'를 아이에게 돌려주는 순간 식탁 전쟁의 절반이 끝나요."},
 {q:"새 음식을 식판에 줄 때 더 좋은 방법은?",
  o:["다른 음식과 안 닿게 따로","좋아하는 음식에 섞어서"],a:0,
  ex:"음식이 서로 닿는 것조차 싫어하는 아이가 많아요. 처음엔 분리해서, 먹으라는 말 없이 '식판에 있기만' 하게 두는 것부터가 노출의 시작이에요."}
];
let i=0;const picked=[];
const play=document.getElementById('play');
function render(){
 const q=QUIZ[i];
 document.getElementById('pf').style.width=((i)/QUIZ.length*100)+'%';
 document.getElementById('qnum').textContent='Q'+(i+1)+' / '+QUIZ.length;
 document.getElementById('qtext').textContent=q.q;
 const ol=document.getElementById('opts');ol.innerHTML='';
 q.o.forEach((opt,idx)=>{const b=document.createElement('button');b.className='opt';b.textContent=opt;b.onclick=()=>choose(idx);ol.appendChild(b);});
}
function choose(idx){picked[i]=idx;i++;if(i<QUIZ.length){render();window.scrollTo({top:0,behavior:'smooth'});}else show();}
function show(){
 let wrong=0;QUIZ.forEach((q,n)=>{if(picked[n]!==q.a)wrong++;});
 // 신호등 판정 — 0~2 초록 / 3~5 노랑 / 6+ 빨강. 비난 금지: '몰라서 다들 이렇게 해요' 프레임 고정.
 const L=wrong<=2
  ?{em:'🟢',cls:'lg',title:'초록불 · 상식 탄탄',share:'초록불🟢',
    sub:'10문제 중 '+wrong+'개만 연구와 달랐어요.',
    blame:'상식은 이미 상위권이에요. 이제 관건은 저녁 6시 식탁에서의 <b>매일 실천</b> — 아는 것과 하는 것 사이가 제일 멀어요.',
    ch3:'초록불! 이제 "매일 실천"이 관건',
    cp:'아는 것과 오늘 저녁 식탁에서 하는 건 다르죠. 앱이 우리 아이 기록에 맞춰 <b>매일 한 걸음씩</b> 실천을 코칭해요.'}
  :wrong<=5
  ?{em:'🟡',cls:'ly',title:'노란불 · 흔한 함정 주의',share:'노란불🟡',
    sub:'10문제 중 <b>'+wrong+'개</b>를 반대로 알고 계셨어요.',
    blame:'부모 잘못이 아니에요 — 다들 "좋다"고 배워온 방법이라 그래요. 그런데 그 함정 몇 개가 <b>편식을 유지시키는 원인</b>일 수 있어요. 아는 순간부터 바뀝니다.',
    ch3:'노란불 — 함정 몇 개만 바꿔도 달라져요',
    cp:'뭘 먼저 바꿀지가 중요해요. 앱이 우리 아이 식사 기록을 보고 <b>매일 한 줄 코칭</b>으로 우선순위를 짚어드려요.'}
  :{em:'🔴',cls:'lr',title:'빨간불 · 지금 방식 점검 필요',share:'빨간불🔴',
    sub:'10문제 중 <b>'+wrong+'개</b>가 연구와 반대였어요.',
    blame:'노력이 부족했던 게 아니라 <b>방향이 반대</b>였을 뿐이에요. 다들 그렇게 배웠으니까요. 애쓴 만큼 역효과가 났을 수 있는데 — 방향만 돌리면 그 노력이 그대로 성과가 돼요.',
    ch3:'빨간불 — 애쓴 방향이 반대였을 뿐이에요',
    cp:'혼자 교정하긴 어려워요. 앱이 35개 국제 가이드라인 기준으로 우리 아이 상황에 맞춘 <b>맞춤 코칭</b>을 매일 보내드려요.'};
 document.getElementById('light').textContent=L.em;
 const lt=document.getElementById('ltitle');lt.textContent=L.title;lt.className='ltitle '+L.cls;
 document.getElementById('lsub').innerHTML=L.sub;
 document.getElementById('noblame').innerHTML=L.blame;
 document.getElementById('coach').innerHTML='<div class="em">💌</div><h3>'+L.ch3+'</h3><p>'+L.cp+'</p>'+
  '<a class="btn" href="https://app.mealfred.com/?utm_source=cookie&utm_medium=quiz&utm_campaign=cookie_series" target="_blank" rel="noopener">앱에서 편식 코칭 받기 →</a>';
 window.mfShareText='우리 집 식탁 신호등은 '+L.share+'! (10문제 중 '+wrong+'개를 반대로 알고 있었어요) 편식 상식 테스트, 너도 켜봐 🚦';
 document.getElementById('review').innerHTML=QUIZ.map((q,n)=>{
   const ok=picked[n]===q.a;
   return '<div class="rev"><div class="rq">Q'+(n+1)+'. '+q.q+'</div>'+
     '<div class="ra '+(ok?'ok':'no')+'"><span>'+(ok?'✅':'❌')+'</span><span>정답: '+q.o[q.a]+(ok?'':' (내 답: '+q.o[picked[n]]+')')+'</span></div>'+
     '<div class="ex">'+q.ex+'</div></div>';
 }).join('');
 play.classList.add('hidden');document.getElementById('out').classList.remove('hidden');
 window.scrollTo({top:0,behavior:'smooth'});
 gtag('event','cookie_result',{tool:'quiz',score:QUIZ.length-wrong,light:L.cls});
}
render();
</script>
