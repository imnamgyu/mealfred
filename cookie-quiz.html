function render(){
 const q=QUIZ[i];
 document.getElementById('pf').style.width=((i)/QUIZ.length*100)+'%';
 document.getElementById('qnum').textContent='Q'+(i+1)+' / '+QUIZ.length+' · 10점';
 document.getElementById('qtext').textContent=q.q;
 document.getElementById('qbox').innerHTML=q.box?'<div class="qbox">'+q.box+'</div>':'';
 const ol=document.getElementById('opts');ol.innerHTML='';
 q.o.forEach((opt,idx)=>{const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="no">'+CIRC[idx]+'</span>'+opt;b.onclick=()=>choose(idx);ol.appendChild(b);});
}
function choose(idx){picked[i]=idx;i++;if(i<QUIZ.length){render();window.scrollTo({top:0,behavior:'smooth'});}else show();}
function show(){
 let correct=0;QUIZ.forEach((q,n)=>{if(picked[n]===q.a)correct++;});
 const score=correct*10;
 const B=BANDS.find(b=>score>=b.min);
 const pe=document.getElementById('pts');pe.innerHTML=score+'<small>점</small>';pe.className='pts '+B.cls;
 document.getElementById('em').textContent=B.em;
 document.getElementById('nick').textContent='「'+B.nick+'」';
 document.getElementById('mod').textContent=B.mod;
 document.getElementById('feat').innerHTML=B.feat.map(f=>'<li>'+f+'</li>').join('');
 document.getElementById('noblame').innerHTML=B.blame;
 document.getElementById('rescard').className='card '+B.bg;
 setTimeout(()=>{document.getElementById('gfill').style.width=Math.max(score,4)+'%';},80);
 document.getElementById('wrongtitle').textContent=correct===10?'📗 오답 없음 — 전 문항 정답':'📕 오답노트 ('+(10-correct)+'문항)';
 document.getElementById('coach').innerHTML='<div class="em">💌</div><h3>'+(score>=70?'이제 "우리 아이 실전" 과목이 남았어요':'점수, 앱이 매일 올려드려요')+'</h3><p>'+(score>=70
   ?'이론 위에, 앱이 우리 아이 식사 기록으로 <b>오늘의 실전 한 수</b>를 매일 알려드려요.'
   :'오답노트를 외울 필요 없어요 — 앱이 우리 아이 상황에 맞춰 <b>매일 한 줄</b>씩 코칭해드립니다.')+'</p>'+
  '<a class="btn" href="https://app.mealfred.com/?utm_source=cookie&utm_medium=quiz&utm_campaign=cookie_series" target="_blank" rel="noopener">앱에서 편식 코칭 받기 →</a>';
 window.mfShareText='내 아이 편식 상식 점수 '+score+'점 「'+B.nick+'」'+B.em+' — 너는 몇 점 나오나 보자 💯';
 document.getElementById('review').innerHTML=QUIZ.map((q,n)=>{
   const ok=picked[n]===q.a;
   if(ok&&correct===10)return '';
   return '<div class="rev"><div class="rq">Q'+(n+1)+'. '+q.q+'</div>'+
     '<div class="ra '+(ok?'ok':'no')+'">'+(ok?'✅ 정답 +10점':'❌ 오답')+' — 정답: '+CIRC[q.a]+' '+q.o[q.a]+(ok?'':' (내 답: '+CIRC[picked[n]]+')')+'</div>'+
     '<div class="ex">'+q.ex+'</div></div>';
 }).join('');
 play.classList.add('hidden');document.getElementById('out').classList.remove('hidden');
 window.scrollTo({top:0,behavior:'smooth'});
 gtag('event','cookie_result',{tool:'quiz',score:score,light:B.cls});
}
render();
</script>
<script src="/cookie-common.js?v=2"></script>
</body>
</html>
