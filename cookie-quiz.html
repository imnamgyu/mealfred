.opt:hover{border-color:var(--p500);background:#FFF8F2}

.score .iqsub{font-size:13px;color:var(--n600);font-weight:700;margin-top:6px}
.score .rank{display:inline-block;background:#FFF0E0;color:var(--org2);font-weight:800;font-size:14px;padding:7px 18px;border-radius:100px;margin-top:12px}
.rev{border:1.5px solid var(--n200);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.rev .rq{font-size:13px;font-weight:800;color:var(--s800);margin-bottom:6px;line-height:1.4}
.rev .ra{font-size:12.5px;font-weight:800;display:flex;gap:6px;align-items:flex-start}
.rev .ra.ok{color:var(--g700)}.rev .ra.no{color:var(--r700)}
.rev .ex{font-size:12px;color:var(--n600);font-weight:600;margin-top:6px;line-height:1.55;background:#FAFAFA;border-radius:8px;padding:8px 10px}
.btn{display:block;width:100%;background:linear-gradient(135deg,#FF6B1A,#C45A00);color:#fff;font-weight:800;font-size:15px;padding:15px;border-radius:100px;text-align:center;border:none;cursor:pointer;box-shadow:0 8px 22px rgba(255,107,26,.22);text-decoration:none;font-family:inherit}
.btn:active{transform:translateY(1px)}
.btn.sec{background:#fff;color:var(--org2);border:1.5px solid var(--p300);box-shadow:none;margin-top:9px}
.appin{background:linear-gradient(135deg,#FFF3E8,#FFE0BD);border:1.5px solid var(--p300);border-radius:16px;padding:20px;text-align:center;margin-top:14px}
.appin .em{font-size:30px}.appin h3{font-size:15.5px;font-weight:800;color:var(--s800);margin:4px 0 6px}
.appin p{font-size:12.5px;color:var(--n600);font-weight:600;margin-bottom:14px;line-height:1.55}
footer{text-align:center;font-size:11px;color:var(--n400);padding:22px 20px 70px;font-weight:600;line-height:1.6}

<body>

  <h1>내 편식 대처법,<br><span class="ac">과학적으로 맞을까?</span></h1>
  <p>8문제로 알아보는 편식 IQ. 정답이 의외라 깜짝 놀랄지도 몰라요. <b>35개 국제 가이드라인</b> 기준.</p>
</header>
<main>
  <div id="play">
    <div class="prog"><div id="pf" class="pf"></div></div>
    <div class="qnum" id="qnum"></div>
    <div class="qtext" id="qtext"></div>
    <div id="opts"></div>
  </div>

  <div id="out" class="hidden">
    <div class="card">
      <div class="score">
        <div class="iq" id="iq"></div>
        <div class="iqsub">편식 IQ</div>
        <div class="rank" id="rank"></div>
      </div>
      <div id="review"></div>
    </div>
    <div class="appin">
      <div class="em">💌</div>

<footer>밀프레드 편식도감 · SOS·Satter·식약처 등 35개 국제 가이드라인 근거 · 참고용</footer>

<script>
const QUIZ=[
 {q:"새로운 음식, 아이가 받아들이기까지 평균 몇 번을 권해야 할까요?",
  o:["1~2번","3~5번","8~15번 이상","거의 안 변해요"],a:2,
  ex:"거부는 정상이에요. 많게는 15번 이상 반복 노출해야 받아들이는 경우가 많아요. 한두 번 거부했다고 '이 아이는 안 먹어'가 아니에요."},
 {q:"\"한 입만 더 먹어!\"라고 권하는 압박은?",
  o:["먹는 양이 늘어요","효과 없거나 오히려 역효과"],a:1,
  ex:"압박은 그 음식에 대한 거부를 오히려 강화해요(Galloway 2006). 강요 없는 반복 노출이 정석이에요."},
 {q:"만 1~5세 중 편식하는 아이는 몇 %나 될까요?",
  o:["5%","10%","25~35%","70%"],a:2,
  ex:"4명 중 1명꼴이에요. 우리 아이만 그런 게 아니라 발달 과정에서 흔한 일이에요."},
 {q:"채소 거부, 가장 효과적인 방법은?",
  o:["좋아하는 음식에 몰래 섞기","사탕·스티커로 보상","반복 노출 + 놀이로 친해지기","다 먹을 때까지 기다리기"],a:2,
  ex:"몰래 섞기·보상은 단기뿐이고 역효과가 날 수 있어요. 보고·만지고·놀며 친해지는 반복 노출이 진짜 해결책이에요."},
 {q:"한 끼 식사 시간으로 적절한 길이는?",
  o:["10분","20~30분","45분 이상","다 먹을 때까지"],a:1,
  ex:"20~30분이 적당해요. 길어질수록 식사가 '전쟁'이 되고 거부가 커져요. 시간이 되면 부드럽게 마무리하세요."},
 {q:"아이가 단맛을 좋아하는 건?",
  o:["잘못 들인 습관","타고난 본능"],a:1,
  ex:"단맛 선호는 생존을 위한 선천적 성향이에요. 부모 탓이 아니니 죄책감 가질 필요 없어요."},
 {q:"식사에서 역할 분담, 가장 건강한 방식은? (사터의 DOR)",
  o:["부모가 무엇·얼마나 다 정한다","아이가 무엇·얼마나 다 정한다","부모=무엇·언제, 아이=먹을지·얼마나"],a:2,
  ex:"사터의 책임 분담(DOR): 부모는 '무엇을·언제·어디서', 아이는 '먹을지·얼마나'를 정해요. 역할을 나누면 식탁이 편해져요."},
 {q:"새 음식을 식판에 줄 때 더 좋은 방법은?",
  o:["다른 음식과 안 닿게 따로","좋아하는 음식에 섞어서"],a:0,
  ex:"음식이 서로 닿는 걸 싫어하는 아이가 많아요. 처음엔 분리해서, 부담 없이 '있기만' 하게 두는 게 좋아요."}
];
let i=0;const picked=[];
const play=document.getElementById('play');
function render(){
 const q=QUIZ[i];
 document.getElementById('pf').style.width=((i)/QUIZ.length*100)+'%';
 document.getElementById('qnum').textContent='Q'+(i+1)+' / '+QUIZ.length;
 document.getElementById('qtext').textContent=q.q;
 const ol=document.getElementById('opts');ol.innerHTML='';
 q.o.forEach((opt,idx)=>{const b=document.createElement('button');b.className='opt';b.textContent=opt;b.onclick=()=>choose(idx);ol.appendChild(b);});
}
function choose(idx){picked[i]=idx;i++;if(i<QUIZ.length){render();window.scrollTo({top:0,behavior:'smooth'});}else show();}
function show(){
 let correct=0;QUIZ.forEach((q,n)=>{if(picked[n]===q.a)correct++;});
 const iq=60+correct*5; // 0→60, 8→100
 let rank;if(correct>=8)rank='상위 5% · 편식 박사님!';else if(correct>=7)rank='상위 15% · 편식 고수';else if(correct>=5)rank='상위 40% · 평균 이상';else if(correct>=3)rank='평균 · 함께 배워가요';else rank='이제 시작! 알면 쉬워져요';
 document.getElementById('iq').textContent=iq;
 document.getElementById('rank').textContent=correct+'/'+QUIZ.length+' 정답 · '+rank;
 document.getElementById('review').innerHTML=QUIZ.map((q,n)=>{
   const ok=picked[n]===q.a;
   return '<div class="rev"><div class="rq">Q'+(n+1)+'. '+q.q+'</div>'+
     '<div class="ra '+(ok?'ok':'no')+'"><span>'+(ok?'✅':'❌')+'</span><span>정답: '+q.o[q.a]+(ok?'':' (내 답: '+q.o[picked[n]]+')')+'</span></div>'+
     '<div class="ex">'+q.ex+'</div></div>';
 }).join('');
 play.classList.add('hidden');document.getElementById('out').classList.remove('hidden');
 window.scrollTo({top:0,behavior:'smooth'});
 gtag('event','cookie_result',{tool:'quiz',score:correct});
}
render();
</script>
