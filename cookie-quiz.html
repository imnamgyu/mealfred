<body data-cookie="quiz">

<script>
// 행동 체크 방식(2026-07-04 이사님): 정답 유추가 가능한 지식퀴즈 대신 "우리 집 얘기다/아니다"만 고르게 하고
// 결과에서 뒤집는다. trap=true(하고 있으면 연구와 반대) 7개 + trap=false(정석, 안 하면 놓침) 3개를 섞어
// "전부 함정" 패턴을 못 읽게 한다. 근거는 문항별 사실검증 10/10 통과분 그대로(Galloway·Birch·Mascola·NHS·Satter).
const QUIZ=[
 {q:"아이가 반찬을 안 먹으면 \"딱 한 입만 먹어보자\" 하고 숟가락을 들이민다.",trap:true,
  ex:"'한 입만' 압박은 그 음식 거부를 오히려 강화해요(Galloway 2006). 먹이려는 정성이 클수록 식탁이 전쟁이 되는 이유예요. 정석은 강요 없는 반복 노출."},
 {q:"\"이거 다 먹으면 아이스크림(영상) 줄게\" 거래를 한다.",trap:true,
  ex:"거래는 아이 머릿속에 '채소=참아야 하는 벌, 디저트=진짜 좋은 것'을 각인해요. 연구에서 보상 걸고 먹인 음식은 나중에 선호가 오히려 떨어졌어요."},
 {q:"싫어하는 채소는 잘게 갈아서 볶음밥·전에 몰래 숨겨 먹인다.",trap:true,
  ex:"그날 영양은 채워져요. 하지만 아이는 먹은 줄 모르니 '보이는 채소'는 여전히 거부해요. 숨기기만으로는 편식이 안 바뀌어요 — 보이는 노출이 같이 가야 해요."},
 {q:"\"남기지 말고 그릇 싹 비워야지\" 하고 다 먹게 한다.",trap:true,
  ex:"먹는 양의 기준은 '그릇'이 아니라 '아이 배'여야 해요. 그릇 기준으로 먹이면 배부름 신호를 무시하는 습관이 들고, 식사가 숙제가 되면서 거부만 커져요."},
 {q:"두세 번 거부한 음식은 \"얘는 이거 안 먹어\" 하고 식단에서 뺀다.",trap:true,
  ex:"새 음식은 많게는 8~15번 이상 노출돼야 받아들여지는 경우가 많아요. 대부분 서너 번에서 포기하는데 — 사실 거기가 제일 아까운 지점이에요."},
 {q:"저녁 1~2시간 전에 간식이나 우유를 준다.",trap:true,
  ex:"밥 전 간식 한 줌, 우유 한 컵이면 아이 위는 이미 차요. '안 먹는 아이'가 아니라 '배고플 틈이 없던 아이'인 경우가 정말 많아요. 코칭에서 제일 먼저 확인하는 신호예요."},
 {q:"\"이거 먹으면 키 커\" \"몸에 좋은 거야\" 하고 설명해서 설득한다.",trap:true,
  ex:"아이에게 '몸에 좋다'는 말은 '맛없다'로 번역돼요. 연구에서 건강 설득은 미취학 아이의 섭취를 오히려 줄였어요. 설명 대신 그냥 맛있게 먹는 모습을 보여주세요."},
 {q:"아이가 먹을 양은 아이가 정하게 두고, 남겨도 잔소리하지 않는다.",trap:false,
  ex:"사터의 책임 분담(DOR) 그대로예요 — 부모는 '무엇을·언제', 아이는 '먹을지·얼마나'. '얼마나'를 아이에게 돌려주는 순간 식탁 전쟁의 절반이 끝나요.",
  miss:"부모가 양까지 정하면 식탁이 힘겨루기가 돼요. 사터의 책임 분담(DOR): 부모는 '무엇을·언제', 아이는 '먹을지·얼마나' — '얼마나'를 아이에게 돌려주는 게 정석이에요."},
 {q:"아이 앞에서 같은 음식을 부모가 맛있게 먹는 모습을 자주 보여준다.",trap:false,
  ex:"아이는 말보다 눈으로 배워요. 부모의 '맛있게 먹는 모습'은 새 음식 수용을 높이는 가장 검증된 방법 중 하나예요.",
  miss:"아이는 말보다 눈으로 배워요. 백 마디 설명보다 부모가 같은 음식을 맛있게 먹는 모습이 강해요 — '먹이는 사람'이 아니라 '같이 먹는 사람'이 되는 게 핵심이에요."},
 {q:"새 음식은 좋아하는 음식과 안 닿게 따로 담고, 먹으라는 말 없이 그냥 놓아둔다.",trap:false,
  ex:"정석 노출법이에요. 음식이 닿는 것조차 싫어하는 아이가 많고, '식판에 있기만' 해도 노출은 시작돼요.",
  miss:"음식이 서로 닿는 것조차 싫어하는 아이가 많아요. 새 음식은 분리해서, 먹으라는 말 없이 '식판에 있기만' 하게 두는 것부터가 노출의 시작이에요."}
];
const OPTS=["네, 우리 집 얘기예요","아니요, 안 그래요"];
let i=0;const picked=[];
const play=document.getElementById('play');
function render(){
 const q=QUIZ[i];
 document.getElementById('pf').style.width=((i)/QUIZ.length*100)+'%';
 document.getElementById('qnum').textContent='장면 '+(i+1)+' / '+QUIZ.length;
 document.getElementById('qtext').textContent=q.q;
 const ol=document.getElementById('opts');ol.innerHTML='';
 OPTS.forEach((opt,idx)=>{const b=document.createElement('button');b.className='opt';b.textContent=opt;b.onclick=()=>choose(idx);ol.appendChild(b);});
}
function choose(idx){picked[i]=idx;i++;if(i<QUIZ.length){render();window.scrollTo({top:0,behavior:'smooth'});}else show();}
function show(){
 // 연구와 반대 = 함정 행동을 '하고 있음'(trap&&네) + 정석을 '안 하고 있음'(!trap&&아니요)
 const bad=QUIZ.map((q,n)=>q.trap ? picked[n]===0 : picked[n]===1);
 const wrong=bad.filter(Boolean).length;
 const L=wrong<=2
  ?{em:'🟢',cls:'lg',title:'초록불 · 식탁이 건강해요',share:'초록불🟢',
    sub:'10가지 장면 중 '+wrong+'개만 연구와 반대 방향이에요.',
    blame:'식탁 습관이 이미 상위권이에요. 이제 관건은 우리 아이에게 맞는 <b>다음 한 걸음</b> — 어떤 음식을 언제 어떻게 내놓을지예요.',
    ch3:'초록불! 이제 "우리 아이 맞춤"이 관건',
    cp:'좋은 습관 위에, 앱이 우리 아이 식사 기록을 보고 <b>오늘 뭘 내놓을지</b>까지 매일 코칭해요.'}
  :wrong<=5
  ?{em:'🟡',cls:'ly',title:'노란불 · 정성이 반대로 가는 중',share:'노란불🟡',
    sub:'10가지 장면 중 <b>'+wrong+'개</b>가 연구와 반대 방향이었어요.',
    blame:'부모 잘못이 아니에요 — 전부 "좋은 부모라서" 하게 되는 행동이라 그래요. 그런데 그중 몇 개가 <b>편식을 유지시키는 원인</b>일 수 있어요. 아는 순간부터 바뀝니다.',
    ch3:'노란불 — 몇 장면만 바꿔도 달라져요',
    cp:'뭘 먼저 바꿀지가 중요해요. 앱이 우리 아이 식사 기록을 보고 <b>매일 한 줄 코칭</b>으로 우선순위를 짚어드려요.'}
  :{em:'🔴',cls:'lr',title:'빨간불 · 애쓴 방향이 반대였어요',share:'빨간불🔴',
    sub:'10가지 장면 중 <b>'+wrong+'개</b>가 연구와 반대 방향이었어요.',
    blame:'노력이 부족했던 게 아니라 <b>방향이 반대</b>였을 뿐이에요. 다들 그렇게 배웠으니까요. 애쓴 만큼 역효과가 났을 수 있는데 — 방향만 돌리면 그 노력이 그대로 성과가 돼요.',
    ch3:'빨간불 — 방향만 돌리면 됩니다',
    cp:'혼자 교정하긴 어려워요. 앱이 35개 국제 가이드라인 기준으로 우리 아이 상황에 맞춘 <b>맞춤 코칭</b>을 매일 보내드려요.'};
 document.getElementById('light').textContent=L.em;
 const lt=document.getElementById('ltitle');lt.textContent=L.title;lt.className='ltitle '+L.cls;
 document.getElementById('lsub').innerHTML=L.sub;
 document.getElementById('noblame').innerHTML=L.blame;
 document.getElementById('coach').innerHTML='<div class="em">💌</div><h3>'+L.ch3+'</h3><p>'+L.cp+'</p>'+
  '<a class="btn" href="https://app.mealfred.com/?utm_source=cookie&utm_medium=quiz&utm_campaign=cookie_series" target="_blank" rel="noopener">앱에서 편식 코칭 받기 →</a>';
 window.mfShareText='우리 집 식탁 신호등은 '+L.share+'! (10가지 장면 중 '+wrong+'개가 연구와 반대래) 너희 집은 몇 개야? 🚦';
 document.getElementById('review').innerHTML=QUIZ.map((q,n)=>{
   const yes=picked[n]===0;
   let cls,head,body;
   if(q.trap&&yes){cls='no';head='❌ 이 행동, 연구는 반대예요';body=q.ex;}
   else if(q.trap&&!yes){cls='ok';head='✅ 이 함정은 피하고 계세요';body=q.ex;}
   else if(!q.trap&&yes){cls='ok';head='✅ 정석대로 하고 계세요';body=q.ex;}
   else{cls='tip';head='💡 놓치고 있던 정석이에요';body=q.miss;}
   return '<div class="rev"><div class="rq">'+(n+1)+'. '+q.q+'</div>'+
     '<div class="ra '+cls+'"><span>'+head+'</span></div>'+
     '<div class="ex">'+body+'</div></div>';
 }).join('');
 play.classList.add('hidden');document.getElementById('out').classList.remove('hidden');
 window.scrollTo({top:0,behavior:'smooth'});
 gtag('event','cookie_result',{tool:'quiz',score:QUIZ.length-wrong,light:L.cls});
}
render();
</script>
<script src="/cookie-common.js?v=2"></script>
