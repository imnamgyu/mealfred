function renderCats(){const cats=cur==='ing'?ING_CATS:MENU_CATS;document.getElementById('cats').innerHTML=cats.map(c=>'<button class="ct'+(c===catSel?' on':'')+'" onclick="setCat(\''+c+'\')">'+c+'</button>').join('');}
function setCat(c){catSel=c;render();}
function tab(t){cur=t;catSel='전체';sortMode=(cur==='menu'&&sortMode==='alt')?'freq':sortMode;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));document.getElementById('q').value='';renderCats();render();}
function setSort(m){sortMode=m;render();}
function sortRows(rows){const a=rows.slice();if(sortMode==='name')a.sort((x,y)=>x.n.localeCompare(y.n,'ko'));else if(sortMode==='alt'&&cur==='ing')a.sort((x,y)=>(y.youa??-1)-(x.youa??-1));else a.sort((x,y)=>(y.freq??-1)-(x.freq??-1));return a;}
function render(){
  const all=cur==='ing'?R.ings:R.menus;
  let filt=catSel==='전체'?all.slice():all.filter(r=>catOf(r)===catSel);
  if(cur==='menu'&&catSel==='전체')filt=filt.sort((a,b)=>(b.freq??-1)-(a.freq??-1)).slice(0,200);
  const byFreq=filt.slice().sort((a,b)=>(b.freq??-1)-(a.freq??-1));
  const rmap=new Map();byFreq.forEach((r,i)=>rmap.set(r,i+1));
  const disp=sortRows(filt);
  document.getElementById('thead').innerHTML=HEAD[cur];
  document.getElementById('tbody').innerHTML=disp.map(r=>(cur==='ing'?ingRow:menuRow)(r,rmap.get(r))).join('');
  document.getElementById('note').innerHTML=NOTE[cur];
  document.getElementById('altsb').style.display=cur==='ing'?'':'none';
  document.querySelectorAll('.sb').forEach(b=>b.classList.toggle('on',b.dataset.s===sortMode));
  document.querySelectorAll('.ct').forEach(b=>b.classList.toggle('on',b.textContent===catSel));
  filter();
}
function filter(){
  const q=document.getElementById('q').value.trim();
  let shown=0,total=0;
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    if(tr.classList.contains('det')){tr.style.display='none';return;}
    total++;const ok=!q||(tr.dataset.n||'').includes(q);tr.style.display=ok?'':'none';if(ok)shown++;
  });
  document.querySelectorAll('.chev').forEach(c=>c.textContent='▸');
  document.getElementById('count').textContent=(q?shown+' / ':'총 ')+total+'개'+(catSel!=='전체'?' · '+catSel:' · 밀프레드 식단표 라이브');
}
document.getElementById('q').addEventListener('input',filter);
document.getElementById('tbody').addEventListener('click',function(e){
  const row=e.target.closest('tr.irow');if(!row)return;
  const det=row.nextElementSibling;if(!det||!det.classList.contains('det'))return;
  const showing=det.style.display==='table-row';
  det.style.display=showing?'none':'table-row';
  const chev=row.querySelector('.chev');if(chev)chev.textContent=showing?'▸':'▾';
});
renderCats();render();
</script>
