  ing:'💡 <b>급식 빈도 = 앱 DB에 수집된 실제 식단표</b>(institution_menu_items · OCR한 어린이집·유치원·초등 식단표)를 식재료로 분해·집계한 <b>실측값</b>. 또래% = dietary4u 영유아 표준식단 + 실측 OCR 식단(143 기관-월) 병합. 주식(쌀·곡물) 제외 · 중복(배추김치→배추 등) 통합.',
  menu:'⚠️ <b>메뉴 빈도 = 편식극복키트 레시피DB</b>(01_참고자료/B_레시피DB 아동기·유아기 코퍼스) 기준이라 <b>「수집된 식단표」가 아님</b>. 유아/초등 = 연령대별 등장 수. <b>진짜 수집 식단표 메뉴 빈도는 라이브 DB 집계가 필요</b>(다음 단계). 밥·음료 제외.'
};
function tab(t){cur=t;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));document.getElementById('q').value='';render();}
function setSort(m){sortMode=m;document.querySelectorAll('.sb').forEach(b=>b.classList.toggle('on',b.dataset.s===m));render();}
function sortRows(rows){const a=rows.slice();if(sortMode==='name')a.sort((x,y)=>x.n.localeCompare(y.n,'ko'));else if(sortMode==='alt')a.sort((x,y)=>cur==='ing'?((y.youa??-1)-(x.youa??-1)):((y.e||0)-(x.e||0)||y.freq-x.freq));else a.sort((x,y)=>(y.freq??-1)-(x.freq??-1));return a;}
function render(){
  const rows=sortRows(cur==='ing'?R.ings:R.menus);
  document.getElementById('thead').innerHTML=HEAD[cur];
  document.getElementById('tbody').innerHTML=rows.map(cur==='ing'?ingRow:menuRow).join('');
  document.getElementById('note').innerHTML=NOTE[cur];
  document.getElementById('altsb').textContent=cur==='ing'?'또래%순':'초등순';
  filter();
}
function filter(){
  const q=document.getElementById('q').value.trim();
  let shown=0;const total=(cur==='ing'?R.ings:R.menus).length;
  document.querySelectorAll('#tbody tr').forEach(tr=>{const ok=!q||tr.dataset.n.includes(q);tr.style.display=ok?'':'none';if(ok)shown++;});
  document.getElementById('count').textContent=q?(shown+' / '+total+'개'):('총 '+total+'개');
}
document.getElementById('q').addEventListener('input',filter);
render();
</script>
