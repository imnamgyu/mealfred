function menuCat(n,g){

function tab(t){cur=t;catSel='전체';sortMode=(cur==='menu'&&sortMode==='alt')?'freq':sortMode;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));document.getElementById('q').value='';renderCats();render();}

function render(){
  const all=cur==='ing'?R.ings:R.menus;

function filter(){
  const q=document.getElementById('q').value.trim();
  let shown=0,total=document.querySelectorAll('#tbody tr').length;
  document.querySelectorAll('#tbody tr').forEach(tr=>{const ok=!q||tr.dataset.n.includes(q);tr.style.display=ok?'':'none';if(ok)shown++;});

}
