<script>
// A안(테토남 문법): 행동 진술 그렇다/아니다 → 유발력 % 게이지 + 6밴드 별명 그라데이션.
// 별명 법칙: 나쁠수록 더 웃기고 귀엽게(자학 공유 유발) — 빌런=애정의 다른 이름 프레임.
const QUIZ=[
 {q:"\"딱 한 입만 먹어보자\"를 한 끼에 세 번 이상 말한 적 있다.",trap:true,
  ex:"'한 입만' 압박은 그 음식 거부를 오히려 강화해요(Galloway 2006). 먹이려는 정성이 클수록 식탁이 전쟁이 되는 이유예요."},
 {q:"\"이거 다 먹으면 아이스크림(유튜브) 줄게\" 거래를 해봤다.",trap:true,
  ex:"거래는 '채소=참아야 하는 벌, 디저트=진짜 좋은 것'을 각인해요. 보상 걸고 먹인 음식은 나중에 선호가 오히려 떨어졌어요."},
 {q:"싫어하는 채소는 다지고 갈아서 볶음밥·전·카레에 숨긴다.",trap:true,
  ex:"그날 영양은 채워져요. 하지만 아이는 먹은 줄 모르니 '보이는 채소'는 여전히 거부 — 숨기기만으로는 편식이 안 바뀌어요."},
 {q:"\"남기지 말고 싹 비우자~\" 그릇 검사를 한다.",trap:true,
  ex:"기준은 '그릇'이 아니라 '아이 배'여야 해요. 그릇 기준 식사는 배부름 신호를 무시하는 습관을 만들어요."},
 {q:"두세 번 뱉어낸 반찬은 식단에서 조용히 은퇴시켰다.",trap:true,
  ex:"새 음식은 많게는 8~15번 이상 노출돼야 받아들여지는 경우가 많아요. 서너 번에서 포기하는 게 제일 아까운 지점이에요."},
 {q:"저녁 전인데 \"배고파\" 소리에 우유·치즈·과일을 내준 적 있다.",trap:true,
  ex:"밥 1~2시간 전 간식·우유면 아이 위는 이미 차요. '안 먹는 아이'가 아니라 '배고플 틈이 없던 아이'인 경우가 정말 많아요."},
 {q:"\"이거 먹으면 키 쑥쑥 커!\" 영양 프레젠테이션을 한다.",trap:true,
  ex:"아이에게 '몸에 좋다'는 말은 '맛없다'로 번역돼요. 연구에서 건강 설득은 섭취를 오히려 줄였어요. 설명 대신 맛있게 먹는 모습을."},
 {q:"먹는 양은 아이가 정하게 두고, 남겨도 잔소리하지 않는다.",trap:false,
  ex:"사터의 책임 분담(DOR) 정석이에요 — 부모는 '무엇을·언제', 아이는 '먹을지·얼마나'.",
  miss:"부모가 양까지 정하면 식탁이 힘겨루기가 돼요. '얼마나'는 아이 몫으로 돌려주는 게 정석(사터 DOR)이에요."},
 {q:"아이가 안 먹는 반찬도 부모가 먼저 맛있게 먹는 모습을 보여준다.",trap:false,
  ex:"아이는 말보다 눈으로 배워요. 부모의 '맛있게 먹는 모습'은 가장 검증된 방법 중 하나예요.",
  miss:"백 마디 설명보다 부모가 같은 음식을 맛있게 먹는 모습이 강해요 — '먹이는 사람'이 아니라 '같이 먹는 사람'."},
 {q:"새 반찬은 좋아하는 음식과 안 닿게 따로 두고, 먹으라는 말은 안 한다.",trap:false,
  ex:"정석 노출법! 음식이 닿는 것조차 싫어하는 아이가 많고, '식판에 있기만' 해도 노출은 시작돼요.",
  miss:"음식이 서로 닿는 것도 싫어하는 아이가 많아요. 새 음식은 분리해서, 노코멘트로 놓아두는 것부터가 노출의 시작이에요."}
];
const OPTS=["네, 그렇다","아니요, 안 그런다"];
// 6밴드: 낮을수록 성인군자, 높을수록 레전드 빌런(더 웃기게)
const BANDS=[
 {max:9, cls:'lg',bg:'bg-g',em:'🕊️',nick:'식탁 위 스위스',mod:'중립국을 선포한 밥상 외교관',
  feat:['압박도 거래도 없는 영세중립 식탁','아이 접시에 평화만 놓는 타입','전국 부모 중 극소수만 도달하는 경지'],
  blame:'이 경지에서 남은 건 하나 — 우리 아이에게 맞는 <b>다음 메뉴 한 수</b>뿐이에요.'},
 {max:29,cls:'lg',bg:'bg-g',em:'🫖',nick:'이성적인 밥상 집사',mod:'감정보다 시스템으로 차리는',
  feat:['웬만한 함정은 이미 피하는 중','가끔 나오는 "한 입만"은 인간적인 애교','정석 루틴이 몸에 반쯤 배어 있음'],
  blame:'거의 다 왔어요. 남은 한두 개 습관만 갈아끼우면 스위스 승격입니다.'},
 {max:49,cls:'ly',bg:'bg-y',em:'🥄',nick:'한입만 협상가',mod:'오늘도 협상 테이블을 여는',
  feat:['"한 입만"이 사실상 인사말','협상 결렬 시 플랜B(거래) 가동','그만큼 아이 끼니에 진심이라는 뜻'],
  blame:'부모 잘못이 아니에요 — 다들 "좋은 부모라서" 하게 되는 행동이에요. 그런데 그 협상이 <b>편식을 유지시키는 원인</b>일 수 있어요.'},
 {max:69,cls:'ly',bg:'bg-y',em:'🏃',nick:'숟가락 든 추격자',mod:'거실 세 바퀴는 기본',
  feat:['식탁을 벗어난 배식 경험 보유','당근을 숨기고 거래하고 쫓아감','체력과 애정 만렙, 방향만 반대'],
  blame:'노력이 부족한 게 아니라 <b>방향이 반대</b>였을 뿐. 그 체력이면 방향만 돌려도 금방입니다.'},
 {max:89,cls:'lr',bg:'bg-r',em:'🍚',nick:'풀옵션 밥상 빌런',mod:'갈고 · 숨기고 · 걸고 · 쫓는',
  feat:['압박·거래·은닉·추격 4대 스킬 만렙','아이 끼니 앞에서 수단과 방법을 안 가림','이 정성이면 방향 바꾸는 순간 최강 부모'],
  blame:'빌런의 정체는 사실 <b>애정 과다</b>예요. 다들 그렇게 배웠으니까요. 아는 순간부터 바뀝니다.'},
 {max:100,cls:'lr',bg:'bg-r',em:'👑',nick:'레전드 밥상 빌런',mod:'사랑이 죄라면 무기징역',
  feat:['교과서에 나오는 함정을 전부 밟는 중','그 누구보다 아이 밥에 진심인 사람','연구와 반대로만 가는 것도 재능(?)'],
  blame:'축하(?)드립니다 — 이 점수는 <b>애정 점수</b>이기도 해요. 방향만 돌리면 그 사랑이 그대로 성과가 됩니다.'}
];
let i=0;const picked=[];
const play=document.getElementById('play');
function render(){
 const q=QUIZ[i];
 document.getElementById('pf').style.width=((i)/QUIZ.length*100)+'%';
 document.getElementById('qnum').textContent='장면 '+(i+1)+' / '+QUIZ.length;
 document.getElementById('qtext').textContent=q.q;
 const ol=document.getElementById('opts');ol.innerHTML='';
 OPTS.forEach((opt,idx)=>{const b=document.createElement('button');b.className='opt';b.textContent=opt;b.onclick=()=>choose(idx);ol.appendChild(b);});
}
function choose(idx){picked[i]=idx;i++;if(i<QUIZ.length){render();window.scrollTo({top:0,behavior:'smooth'});}else show();}
function show(){
 const bad=QUIZ.map((q,n)=>q.trap ? picked[n]===0 : picked[n]===1);
 const wrong=bad.filter(Boolean).length;
 const pct=wrong*10;
 const B=BANDS.find(b=>pct<=b.max);
 const pe=document.getElementById('pct');pe.textContent=pct+'%';pe.className='pct '+B.cls;
 document.getElementById('em').textContent=B.em;
 document.getElementById('nick').textContent='「'+B.nick+'」';
 document.getElementById('mod').textContent=B.mod;
 document.getElementById('feat').innerHTML=B.feat.map(f=>'<li>'+f+'</li>').join('');
 document.getElementById('noblame').innerHTML=B.blame;
 document.getElementById('rescard').className='card '+B.bg;
 setTimeout(()=>{document.getElementById('gfill').style.width=Math.max(pct,4)+'%';},80);
 document.getElementById('coach').innerHTML='<div class="em">💌</div><h3>'+(pct<=29?'이제 "우리 아이 맞춤" 단계':'유발력, 앱이 같이 내려드려요')+'</h3><p>'+(pct<=29
   ?'좋은 습관 위에, 앱이 우리 아이 식사 기록을 보고 <b>오늘 뭘 내놓을지</b>까지 매일 코칭해요.'
   :'어떤 행동부터 바꿀지, 앱이 우리 아이 식사 기록 기준으로 <b>매일 한 줄 코칭</b>을 보내드려요.')+'</p>'+
  '<a class="btn" href="https://app.mealfred.com/?utm_source=cookie&utm_medium=quiz&utm_campaign=cookie_series" target="_blank" rel="noopener">앱에서 편식 코칭 받기 →</a>';
 window.mfShareText='내 편식 유발력 '+pct+'% 「'+B.nick+'」 '+B.em+' ㅋㅋ 너는 몇 %야? 🍚';
 document.getElementById('review').innerHTML=QUIZ.map((q,n)=>{
   const yes=picked[n]===0;
   let cls,head,body;
   if(q.trap&&yes){cls='no';head='❌ 유발력 +10% — 연구는 반대예요';body=q.ex;}
   else if(q.trap&&!yes){cls='ok';head='✅ 이 함정은 피하는 중';body=q.ex;}
   else if(!q.trap&&yes){cls='ok';head='✅ 정석 실천 중';body=q.ex;}
   else{cls='tip';head='💡 유발력 +10% — 놓치고 있던 정석';body=q.miss;}
   return '<div class="rev"><div class="rq">'+(n+1)+'. '+q.q+'</div>'+
     '<div class="ra '+cls+'">'+head+'</div>'+
     '<div class="ex">'+body+'</div></div>';
 }).join('');
 play.classList.add('hidden');document.getElementById('out').classList.remove('hidden');
 window.scrollTo({top:0,behavior:'smooth'});
 gtag('event','cookie_result',{tool:'quiz_a',score:100-pct,light:B.cls});
}
render();
</script>
