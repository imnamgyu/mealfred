<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;color:#1a2b4a;background:#10192b;-webkit-font-smoothing:antialiased}
.deck{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth;background:linear-gradient(180deg,#16243f 0%,#1a2b4a 100%)}
.deck::-webkit-scrollbar{width:0}
.slide{min-height:100vh;scroll-snap-align:center;display:flex;align-items:center;justify-content:center;padding:clamp(14px,3.2vh,42px) clamp(14px,3vw,48px);position:relative}
.slide .frame{position:relative;container-type:inline-size;width:100%;max-width:1180px;aspect-ratio:16/9;border-radius:clamp(8px,1vw,16px);overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.45),0 2px 0 rgba(255,255,255,0.04);background:#fff}
.slide img{display:block;width:100%;height:100%;object-fit:contain;background:#fff}
/* page-number overlay: masks burned "/13" on untouched slides, prints correct "/14" */
.frame .msk{position:absolute;left:87.6%;top:91.8%;width:8.6%;height:5.2%;border-radius:3px;z-index:2}
.frame .msk.cr{background:#FBF6F0}
.frame .msk.wh{background:#FFFFFF}
.frame .pg{position:absolute;right:5.75%;bottom:3.4%;z-index:3;font-weight:800;font-size:1.5cqw;letter-spacing:0.04em;color:#5A6373}
/* top bar */
.bar{position:fixed;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:30;pointer-events:none}
.bar a,.bar .pill{pointer-events:auto;text-decoration:none;font-weight:800;font-size:12.5px;padding:8px 14px;border-radius:100px;display:inline-flex;align-items:center;gap:6px;transition:all .15s;backdrop-filter:blur(8px)}
.bar .home{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.18)}
.bar .home:hover{background:rgba(255,255,255,0.22)}
.bar .pdf{background:#FFB877;color:#1a2b4a}
.bar .pdf:hover{background:#ffc999}
/* progress */
.prog{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#FF8A47,#FFB877);width:0;z-index:31;transition:width .2s}
.counter{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:30;background:rgba(0,0,0,0.32);color:rgba(255,255,255,0.85);font-size:12px;font-weight:800;padding:6px 14px;border-radius:100px;backdrop-filter:blur(8px);letter-spacing:0.03em}
.counter b{color:#FFD9B8}
/* nav arrows */
.nav{position:fixed;right:18px;bottom:54px;z-index:30;display:flex;flex-direction:column;gap:8px}
.nav button{width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.12);color:#fff;font-size:16px;font-weight:700;cursor:pointer;backdrop-filter:blur(8px);transition:all .15s;display:flex;align-items:center;justify-content:center}
.nav button:hover{background:rgba(255,255,255,0.25)}
.nav button:disabled{opacity:0.3;cursor:default}
@media(max-width:680px){.nav{display:none}.bar a,.bar .pill{font-size:11.5px;padding:7px 11px}}
@media print{.bar,.prog,.counter,.nav{display:none}.deck{height:auto;overflow:visible}.slide{min-height:auto;page-break-after:always;padding:0}.slide .frame{box-shadow:none;border-radius:0;max-width:100%}@page{size:A4 landscape;margin:0}}
</style>
</head>
<body>

<div class="prog" id="prog"></div>
<div class="bar">
  <a href="/docs.html" class="home">← 문서 허브</a>
  <a href="/pitch.pdf" download class="pdf">📄 PDF 내려받기</a>
</div>

<div class="deck" id="deck">
  <section class="slide"><div class="frame"><img src="/pitch-slides/s-01.jpg" alt="표지 — 밀프레드 편식 · AI 영유아 편식 헬스케어 · 편식, 데이터로 다루다 · 진단→코칭→충족"></div></section>
  <section class="slide"><div class="frame"><img src="/pitch-slides/s-02.jpg" loading="lazy" alt="문제 — 4명 중 1명이 편식, 마땅한 해결책조차 없습니다 · 골든타임 만 2~6세 · 맘카페·사설치료·간편식의 한계"><span class="msk cr"></span><span class="pg">02 / 14</span></div></section>
  <section class="slide"><div class="frame"><img src="/pitch-slides/s-03.jpg" loading="lazy" alt="아하 모먼트 — 엄마도 포기한 아이, 코칭 10회·3주 만에 생당근을 스스로 집어 먹다"></div></section>
  <section class="slide"><div class="frame"><img src="/pitch-slides/s-04.jpg" loading="lazy" alt="솔루션 — 진단·코칭·충족, 하나의 루프로 (측정→결핍 진단 / 결핍→개인화 처방 / 처방→충족)"><span class="msk wh"></span><span class="pg">04 / 14</span></div></section>
  <section class="slide"><div class="frame"><img src="/pitch-slides/s-05.jpg" loading="lazy" alt="엔진 01 매핑 — 메뉴 한 줄을 영양으로 환원 · 4단 매핑·learned 코퍼스 플라이휠·31종 영양 신호등"><span class="msk cr"></span><span class="pg">05 / 14</span></div></section>
  <section class="slide"><div class="frame"><img src="/pitch-slides/s-06.jpg" loading="lazy" alt="엔진 02 코칭 엔진 — 35가지 국제 편식 이론을 하나의 코칭 엔진으로 · 8개 엔진 모듈 · 매 판단마다 LLM을 부르지 않음"><span class="msk wh"></span><span class="pg">06 / 14</span></div></section>
  <section class="slide"><div class="frame"><img src="/pitch-slides/s-07.jpg" loading="lazy" alt="엔진 02 방법론 하네스 — 35가지 방법론 5×7 · CoachPlan(frame·target·move·signature) · 얇은 LLM 작문 월 약 900원"><span class="msk cr"></span><span class="pg">07 / 14</span></div></section>
  <section class="slide"><div class="frame"><img src="/pitch-slides/s-08.jpg" loading="lazy" alt="엔진 02 코치 편지 — 엔진의 결론은 매일 한 통의 편지로 · 매일 새로 도착·최근 3일 보관·강요 없는 어조"><span class="msk wh"></span><span class="pg">08 / 14</span></div></section>

  <section class="slide"><div class="frame"><img src="/pitch-slides/s-10.jpg" loading="lazy" alt="충족 — 폐기 없이 딱 필요한 만큼만 · 골고루 키트 개인화 박스 19,900원·일주일 14끼니·콜드체인 배송"><span class="msk wh"></span><span class="pg">10 / 14</span></div></section>
  <section class="slide"><div class="frame"><img src="/pitch-slides/s-11.jpg" loading="lazy" alt="유통 — 업계 1위 교육용 요리키트 영업망으로 학부모에게 바로 · 누적 10만+ 요리수업 아이·YoY 130%·재구매 50%"><span class="msk cr"></span><span class="pg">11 / 14</span></div></section>
  <section class="slide"><div class="frame"><img src="/pitch-slides/s-12.jpg" loading="lazy" alt="성장 — 무료 식단표 평가가 가장 싼 학부모 유입 채널 · 미끼(스낵 콘텐츠)→유입→데이터 플라이휠→편식 전환 · CAC≈0"><span class="pg">12 / 14</span></div></section>
  <section class="slide"><div class="frame"><img src="/pitch-slides/s-13.jpg" loading="lazy" alt="시장 — 송곳에서 우산으로 · 편식 60만(SOM)→영유아 200만(SAM)→글로벌 편식 시장(TAM)"><span class="pg">13 / 14</span></div></section>
  <section class="slide"><div class="frame"><img src="/pitch-slides/s-14.jpg" loading="lazy" alt="팀 — 유료고객 10만을 만든 창업가가 엔진을 직접 짠다 · 임남규 CEO/CTO(밀프레드 편식 AI) ↔ 푸드희스토리 협력사(대표 임재희)"><span class="pg">14 / 14</span></div></section>

<div class="counter" id="counter"><b>01</b> / 14</div>
<div class="nav">
  <button id="prev" aria-label="이전 슬라이드">↑</button>
  <button id="next" aria-label="다음 슬라이드">↓</button>
</div>

<script>
(function(){
  var deck=document.getElementById('deck');
  var slides=[].slice.call(deck.querySelectorAll('.slide'));
  var N=slides.length;
  var counter=document.getElementById('counter');
  var prog=document.getElementById('prog');
  var prev=document.getElementById('prev'), next=document.getElementById('next');
  var cur=0;
  function current(){
    var mid=deck.scrollTop+deck.clientHeight/2, i=0;
    for(var k=0;k<N;k++){ if(slides[k].offsetTop<=mid) i=k; }
    return i;
  }
  function render(){
    cur=current();
    counter.innerHTML='<b>'+String(cur+1).padStart(2,'0')+'</b> / '+N;
    prog.style.width=((cur)/(N-1)*100)+'%';
    prev.disabled=(cur===0); next.disabled=(cur===N-1);
  }
  function go(i){ i=Math.max(0,Math.min(N-1,i)); slides[i].scrollIntoView({behavior:'smooth'}); }
  deck.addEventListener('scroll',function(){ window.requestAnimationFrame(render); },{passive:true});
  prev.addEventListener('click',function(){ go(current()-1); });
  next.addEventListener('click',function(){ go(current()+1); });
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowDown'||e.key==='PageDown'||(e.key===' '&&!e.shiftKey)||e.key==='j'){ e.preventDefault(); go(current()+1); }
    else if(e.key==='ArrowUp'||e.key==='PageUp'||(e.key===' '&&e.shiftKey)||e.key==='k'){ e.preventDefault(); go(current()-1); }
    else if(e.key==='Home'){ e.preventDefault(); go(0); }
    else if(e.key==='End'){ e.preventDefault(); go(N-1); }
  });
  render();
})();
</script>
